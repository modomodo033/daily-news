<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>每日新闻资讯播报 - 2026年7月7日</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
        }
        
        .player-card {
            background: #fff;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.15);
            padding: 28px 24px;
            width: 100%;
            max-width: 420px;
            text-align: center;
        }
        
        .date-badge {
            display: inline-block;
            background: #f0f0ff;
            color: #667eea;
            padding: 4px 14px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 16px;
        }
        
        .title {
            font-size: 22px;
            font-weight: 700;
            color: #1a1a2e;
            margin-bottom: 6px;
        }
        
        .subtitle {
            font-size: 14px;
            color: #888;
            margin-bottom: 20px;
        }
        
        .cover {
            width: 120px;
            height: 120px;
            border-radius: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            margin: 0 auto 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
            box-shadow: 0 8px 30px rgba(102, 126, 234, 0.3);
        }
        
        .progress-bar {
            width: 100%;
            height: 4px;
            background: #e8e8f0;
            border-radius: 2px;
            margin: 16px 0;
            cursor: pointer;
            position: relative;
        }
        
        .progress-fill {
            height: 100%;
            background: #667eea;
            border-radius: 2px;
            width: 0%;
            transition: width 0.1s linear;
        }
        
        .time-info {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            color: #999;
            margin-bottom: 12px;
        }
        
        .controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            margin: 8px 0 16px;
        }
        
        .btn {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            transition: all 0.2s;
        }
        
        .btn-play {
            width: 60px;
            height: 60px;
            background: #667eea;
            color: white;
            font-size: 26px;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }
        
        .btn-play:hover { background: #5a6fd6; transform: scale(1.05); }
        .btn-play:active { transform: scale(0.95); }
        
        .btn-sm {
            width: 40px;
            height: 40px;
            background: #f0f0ff;
            color: #667eea;
            font-size: 16px;
        }
        
        .btn-sm:hover { background: #e0e0f5; }
        
        .speed-btn {
            background: #f0f0ff;
            color: #667eea;
            border: none;
            border-radius: 16px;
            padding: 6px 14px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
        }
        
        .speed-btn:hover { background: #e0e0f5; }
        
        .tags {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            justify-content: center;
            margin-top: 16px;
            padding-top: 16px;
            border-top: 1px solid #f0f0f0;
        }
        
        .tag {
            background: #f0f0ff;
            color: #667eea;
            padding: 3px 10px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 500;
        }
        
        .footer {
            margin-top: 12px;
            font-size: 11px;
            color: #bbb;
        }
    </style>
</head>
<body>
    <div class="player-card">
        <div class="date-badge">📅 2026年7月7日 · 星期二</div>
        <h1 class="title">🎙️ 每日新闻资讯播报</h1>
        <p class="subtitle">财经 · 国际政治 · AI · 民生 · 科技 · 能源 · 军事 · 健康 · 灾害</p>
        
        <div class="cover">🎧</div>
        
        <div class="progress-bar" id="progressBar">
            <div class="progress-fill" id="progressFill"></div>
        </div>
        
        <div class="time-info">
            <span id="currentTime">00:00</span>
            <span id="duration">07:15</span>
        </div>
        
        <div class="controls">
            <button class="btn btn-sm" id="btnRewind" title="后退15秒">⏪</button>
            <button class="btn btn-play" id="btnPlay">▶️</button>
            <button class="btn btn-sm" id="btnForward" title="前进15秒">⏩</button>
        </div>
        
        <div>
            <button class="speed-btn" id="btnSpeed">1.0x</button>
        </div>
        
        <div class="tags">
            <span class="tag">📊 财经</span>
            <span class="tag">🌍 国际</span>
            <span class="tag">🤖 AI</span>
            <span class="tag">🏠 民生</span>
            <span class="tag">🔬 科技</span>
            <span class="tag">⛽ 能源</span>
            <span class="tag">🎖️ 军事</span>
            <span class="tag">🏥 健康</span>
            <span class="tag">🚨 灾害</span>
        </div>
        
        <div class="footer">由 WorkBuddy AI 自动生成 · 每日更新</div>
    </div>
    
    <audio id="audio" preload="auto">
        <source src="news_2026-07-07.mp3" type="audio/mpeg">
    </audio>
    
    <script>
        const audio = document.getElementById('audio');
        const btnPlay = document.getElementById('btnPlay');
        const btnRewind = document.getElementById('btnRewind');
        const btnForward = document.getElementById('btnForward');
        const btnSpeed = document.getElementById('btnSpeed');
        const progressBar = document.getElementById('progressBar');
        const progressFill = document.getElementById('progressFill');
        const currentTimeEl = document.getElementById('currentTime');
        const durationEl = document.getElementById('duration');
        
        let isPlaying = false;
        let speeds = [0.75, 1.0, 1.25, 1.5, 1.75, 2.0];
        let speedIdx = 1;
        
        function formatTime(seconds) {
            const m = Math.floor(seconds / 60);
            const s = Math.floor(seconds % 60);
            return String(m).padStart(2, '0') + ':' + String(s).padStart(2, '0');
        }
        
        audio.addEventListener('loadedmetadata', () => {
            durationEl.textContent = formatTime(audio.duration);
        });
        
        audio.addEventListener('timeupdate', () => {
            const pct = (audio.currentTime / audio.duration) * 100;
            progressFill.style.width = pct + '%';
            currentTimeEl.textContent = formatTime(audio.currentTime);
        });
        
        progressBar.addEventListener('click', (e) => {
            const rect = progressBar.getBoundingClientRect();
            const pct = (e.clientX - rect.left) / rect.width;
            audio.currentTime = pct * audio.duration;
        });
        
        btnPlay.addEventListener('click', () => {
            if (isPlaying) {
                audio.pause();
                btnPlay.textContent = '▶️';
            } else {
                audio.play();
                btnPlay.textContent = '⏸️';
            }
            isPlaying = !isPlaying;
        });
        
        audio.addEventListener('ended', () => {
            btnPlay.textContent = '▶️';
            isPlaying = false;
        });
        
        btnRewind.addEventListener('click', () => {
            audio.currentTime = Math.max(0, audio.currentTime - 15);
        });
        
        btnForward.addEventListener('click', () => {
            audio.currentTime = Math.min(audio.duration, audio.currentTime + 15);
        });
        
        btnSpeed.addEventListener('click', () => {
            speedIdx = (speedIdx + 1) % speeds.length;
            audio.playbackRate = speeds[speedIdx];
            btnSpeed.textContent = speeds[speedIdx] + 'x';
        });
    </script>
</body>
</html>
